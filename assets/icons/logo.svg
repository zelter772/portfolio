<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- background -->
  <rect x="0" y="0" width="160" height="160" rx="16" fill="#0f0f0f" stroke="#1e3a5f" stroke-width="0.5"/>
  <!-- corner brackets -->
  <polyline points="12,36 12,12 36,12" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="square"/>
  <polyline points="124,148 148,148 148,124" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="square"/>
  <!-- A — left diagonal -->
  <line x1="32" y1="118" x2="54" y2="50" stroke="#F5F5F5" stroke-width="5" stroke-linecap="square"/>
  <!-- A — right diagonal -->
  <line x1="54" y1="50" x2="76" y2="118" stroke="#F5F5F5" stroke-width="5" stroke-linecap="square"/>
  <!-- A — crossbar in blue -->
  <line x1="40" y1="88" x2="68" y2="88" stroke="#3B82F6" stroke-width="3" stroke-linecap="square"/>
  <!-- D — vertical stroke -->
  <line x1="88" y1="50" x2="88" y2="118" stroke="#F5F5F5" stroke-width="5" stroke-linecap="square"/>
  <!-- D — top horizontal -->
  <line x1="88" y1="50" x2="118" y2="50" stroke="#F5F5F5" stroke-width="5" stroke-linecap="square"/>
  <!-- D — bottom horizontal -->
  <line x1="88" y1="118" x2="118" y2="118" stroke="#F5F5F5" stroke-width="5" stroke-linecap="square"/>
  <!-- D — right vertical edge in white -->
  <line x1="118" y1="50" x2="118" y2="118" stroke="#F5F5F5" stroke-width="5" stroke-linecap="square"/>
</svg>
