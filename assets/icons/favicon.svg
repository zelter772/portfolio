<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- background -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#0f0f0f"/>
  <!-- corner brackets -->
  <polyline points="3,8 3,3 8,3" fill="none" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="square"/>
  <polyline points="24,29 29,29 29,24" fill="none" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="square"/>
  <!-- A — left diagonal -->
  <line x1="5" y1="25" x2="10" y2="9" stroke="#F5F5F5" stroke-width="1.8" stroke-linecap="square"/>
  <!-- A — right diagonal -->
  <line x1="10" y1="9" x2="15" y2="25" stroke="#F5F5F5" stroke-width="1.8" stroke-linecap="square"/>
  <!-- A — crossbar in blue -->
  <line x1="7" y1="19" x2="13" y2="19" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="square"/>
  <!-- D — vertical stroke -->
  <line x1="17" y1="9" x2="17" y2="25" stroke="#F5F5F5" stroke-width="1.8" stroke-linecap="square"/>
  <!-- D — top horizontal -->
  <line x1="17" y1="9" x2="25" y2="9" stroke="#F5F5F5" stroke-width="1.8" stroke-linecap="square"/>
  <!-- D — bottom horizontal -->
  <line x1="17" y1="25" x2="25" y2="25" stroke="#F5F5F5" stroke-width="1.8" stroke-linecap="square"/>
  <!-- D — right vertical -->
  <line x1="25" y1="9" x2="25" y2="25" stroke="#F5F5F5" stroke-width="1.8" stroke-linecap="square"/>
</svg>
